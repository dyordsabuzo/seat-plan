<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Water Blue Background Circle -->
  <circle cx="32" cy="32" r="30" fill="#E3F2FD" stroke="#1E88E5" stroke-width="2"/>
  
  <!-- Dragon Boat Paddle (Rotated diagonally) -->
  <g transform="rotate(45 32 32)">
    <!-- T-Grip Handle -->
    <rect x="25" y="10" width="14" height="4" rx="1.5" fill="#424242"/>
    
    <!-- Wooden Shaft -->
    <rect x="30" y="14" width="4" height="26" fill="#8D6E63"/>
    
    <!-- Black Grip Tape / Shaft Connector -->
    <rect x="30" y="36" width="4" height="4" fill="#212121"/>
    
    <!-- Red Flared Blade -->
    <path d="M 30 40 L 34 40 L 38 54 C 38 55.5 37 56 35.5 56 L 28.5 56 C 27 56 26 55.5 26 54 Z" fill="#D32F2F"/>
  </g>
</svg>